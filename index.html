<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cj player</title>
    <link rel="stylesheet" href="styles/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double:wght@100..900&family=Bitcount+Prop+Single+Ink:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <main>
        <section></section>
        <section></section>
    
        <section>
            <div></div>
            <div></div>
    
            <div>
                <div>
                    <img src="images/typeonegative.png" alt="Type O Negative CD">
                    <img src="images/lushmitski.png" alt="Mitski CD">
                </div>
                <span></span>
                <span></span>
            </div>
    
            <div>
                <div>
                    <p>Track 8 - Type O Negative - Creepy Green Light</p>
                    <p>Track 4 - Mitski - Brand New City</p>
                </div>
                <div></div>
            </div>
    
            <div>
                <h1>
                    <span>c</span><span>j</span><span> </span><span>p</span><span>l</span><span>a</span><span>y</span><span>e</span><span>r</span>
                </h1>
                <label>
                    <input type="checkbox">
                </label>
                <label>
                    <input type="checkbox">
                </label>
                <div>
                    <label for="song-one">
                        <input type="radio" name="track" id="song1">
                    </label>
                    <label>
                        <input type="checkbox">
                    </label>
                    <label for="song-two">
                        <input type="radio" name="track" id="song2">
                    </label>
                </div>
                <div>
                    <label>
                        <input type="range" value="0" min="0" max="100" list="volume" name="sound">
                    </label>
                    <datalist id="volume">
                        <option value="0">0</option>
                        <option value="25">25</option>
                        <option value="50">50</option>
                        <option value="75">75</option>
                        <option value="100">100</option>
                    </datalist>
                </div>
            </div>
            <span></span>
        </section>
    </main>
    <script src="script/main.js"></script>
</body>
</html>
