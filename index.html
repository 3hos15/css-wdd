<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cj player</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div>
        <!-- denken aan wat ik de cd speler kan laten animeren -->
        <!-- labels om de inputs doen aria-label="cd-on-off" geen names nodig -->
        <section>
            <h1>cj player</h1>
            <label aria-label="cd-on-off">
                <input type="checkbox" required name="cd-on-off">
            </label>
            <label aria-label="display-mode">
                <input type="checkbox" name="display-mode">
            </label>

            <!-- player controls -->
            <div>
                <label for="song-one">
                    ⏮
                    <input type="radio" name="track" id="song1">
                </label> 
                <label for="song-two">
                    ⏮
                    <input type="radio" name="track" id="song2">
                </label> 

                <label>
                    play-pause
                    <input type="checkbox" name="play-pause">
                </label>

                <label for="song-two">
                    ⏭
                    <input type="radio" name="track" id="song2">
                </label> 
                <label for="song-one">
                    ⏭
                    <input type="radio" name="track" id="song1">
                </label> 

            </div>

            <!-- hide w css for fake track playing -->
            <!-- <input type="radio" name="track" id="song1">
            <input type="radio" name="track" id="song2"> -->

            <!-- player volume, low to max -->
            <div> 
                <p>-</p>
                <!-- https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/meter -->
                <!-- values toevoegen en aria labels en daarmee stylen in css -->
                <label aria-label="mute">
                    <input type="radio" name="volume" value=0>
                </label>
            
                <label aria-label="low">
                    <input type="radio" name="volume" value=25>
                </label>
            
                <label aria-label="medium">
                    <input type="radio" name="volume" value=50>
                </label>
                
                <label aria-label="high">
                    <input type="radio" name="volume" value=75>
                </label>
                
                <label aria-label="max">
                    <input type="radio" name="volume" value=100>
                </label>

                <p>+</p>
            </div>

            <div>
            <div>
                <!-- song "progress" -->
                <span></span>
            </div>

            <div>
                <!-- song on display -->
                <h2>song........</h2>
            </div>
            <div>
                <!-- volume progress, color coded -->
                <!-- <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span> -->
                <meter min="0" max="100" value="0"></meter>
                <meter min="0" max="100" value="25"></meter>
                <meter min="0" max="100" value="50"></meter>
                <meter min="0" max="100" value="75"></meter>
                <meter min="0" max="100" value="100"></meter>
            </div>
            </div>

            <div>
                <!-- cd image, more styling div?! -->
                <img src="" alt="">
            </div>
        </section>
    </div>
</body>
</html>
