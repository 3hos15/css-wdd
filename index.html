<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cj player</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double:wght@100..900&family=Bitcount+Prop+Single+Ink:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div>
        <!-- denken aan wat ik de cd speler kan laten animeren -->
        <!-- labels om de inputs doen aria-label="cd-on-off" geen names nodig -->
        <section>
            <h1>cj player</h1>
            <label aria-label="cd-on-off">
                <input type="checkbox" required>
            </label>
            <label aria-label="display-mode">
                <input type="checkbox">
            </label>

            <div>
                <label for="song-one" aria-label="prev-one">
                    
                    <input type="radio" name="track" id="song1">
                </label> 
                <label for="song-two" aria-label="prev-two">
                    
                    <input type="radio" name="track" id="song2">
                </label> 

                <label aria-label="play-pause">
                    <input type="checkbox">
                </label>

                <label for="song-two" aria-label="next-one">
                    
                    <input type="radio" name="track" id="song2">
                </label> 
                <label for="song-one" aria-label="next-two">
                    <input type="radio" name="track" id="song1">
                </label> 

            </div>

            <div>
                <label aria-label="volume">
                    <input type="range" value="0" min="0" max="100" list="volume" name="sound">
                </label>

                <datalist id="volume">
                    <option value="0">0</option>
                    <option value="25">25</option>
                    <option value="50">50</option>
                    <option value="75">75</option>
                    <option value="100">100</option>
                </datalist>

                <div aria-label="volume-tracker"></div>
            </div>

            <div>
                <!-- cd image, more styling div?! -->
                <img src="images/typeonegative.png" alt="">
            </div>
            <div aria-label="song-tracker" >
                <!-- track info -->
                <p>currentsongblaaaaaablaaablaaaablaaa</p>
            </div>
            <div aria-label="song-progress">
                <div></div>
            </div>

            <div></div>
            <div></div>
            <div></div>
            <div></div>

            <div></div>
        </section>
    </div>
    <script src="script/main.js"></script>
</body>
</html>
